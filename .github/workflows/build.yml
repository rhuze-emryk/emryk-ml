---
name: Build container image
on:
  pull_request:
    branches:
      - main
  schedule:
    # Weekly, not nightly — and this scheduled run is the ONLY routine publish.
    # Pushes to main build-and-test but do NOT publish (see the publish-step
    # `if:` guards below): the registry moves only on this Monday cron or a
    # manual workflow_dispatch. That gives the maintainer one predictable
    # approval per week instead of one per merge.
    #
    # The base is digest-pinned, so a scheduled rebuild only refreshes the ~20
    # dnf-layered packages — kernel/userland/driver arrive via Renovate digest
    # bumps (auto-merged to main during the week, then shipped by the next run
    # of this cron). Monday aligns with vendor-drift-watch; fire
    # workflow_dispatch for an urgent fix that can't wait for Monday.
    # (See SECURITY-TODO #31.)
    - cron: '05 10 * * MON'  # 10:05 UTC Mondays
  push:
    branches:
      - main
    # Mirrors NONIMAGE_RE in the "Detect image-relevant changes" step below —
    # keep the two lists in sync. Pushes to main run a build to validate that
    # main stays buildable, but they no longer publish; this list keeps a
    # docs/CI-config-only merge from spending ~8 min on a build that can't
    # change the image anyway.
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.docs/**'
      - '.claude/**'
      - 'disk_config/**'
      - 'renovate.json'
      - '.github/renovate.json5'
      - '.github/workflows/renovate-notify.yml'
      - '.github/workflows/vendor-drift-watch.yml'
      - '.github/workflows/monday-cockpit.yml'
      - '.github/workflows/build-disk.yml'
      - 'LICENSE'
      - 'Justfile'
      - 'artifacthub-repo.yml'
      - '.gitignore'
  workflow_dispatch:

env:
  IMAGE_DESC: "Managed Fedora Kinoite bootc image for cloud ML workstations. NVIDIA open drivers, KDE Plasma, Tailscale, Cockpit, Podman/distrobox."
  IMAGE_KEYWORDS: "bootc,ublue,kinoite,nvidia,machine-learning,fedora,kde,cloud-workstation"
  IMAGE_LOGO_URL: "https://avatars.githubusercontent.com/u/120078124?s=200&v=4"
  IMAGE_NAME: "${{ github.event.repository.name }}"  # output image name, usually same as repo name
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"  # do not edit
  DEFAULT_TAG: "latest"
  # Pinned for reproducibility; bumped by renovate (SECURITY-TODO #14).
  GRYPE_VERSION: "v0.114.0"
  SYFT_VERSION: "v1.45.0"

concurrency:
  # Suffix the group with whether this run publishes (schedule/dispatch) so
  # publishing runs and non-publishing build runs never share a group. Without
  # this, a push to main during the weekly publish — or while it waits at the
  # production-signing approval gate — would land in the same group and CANCEL
  # the publish (cancel-in-progress), so the week's release could silently
  # vanish just as you go to approve it. PR runs stay isolated by their own ref.
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}-${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
  cancel-in-progress: true

jobs:
  build_push:
    name: Build and push image
    runs-on: ubuntu-24.04

    # Gate SIGNING_SECRET behind the `production-signing` environment
    # (required-reviewer approval, restricted to main) — KEY-POLICY.md
    # "GitHub Environment runbook". Resolves to the environment ONLY for the
    # publishing paths (the Monday schedule + manual workflow_dispatch on main);
    # on pull_request AND on ordinary pushes to main it is empty, so neither PR
    # builds nor post-merge validation builds are gated. That is the whole point
    # of the weekly cadence: the approval prompt fires once a week on the
    # publish, not once per merge. The signing step reads SIGNING_SECRET, which
    # is environment-scoped once moved there.
    environment: ${{ ((github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)) && 'production-signing' || '' }}

    permissions:
      contents: read
      packages: write
      id-token: write
      # SECURITY-TODO #8: needed for SLSA provenance + SBOM attestations.
      attestations: write

    steps:
      - name: Prepare environment
        run: |
          # Lowercase the image uri
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}

      # These stage versions are pinned by https://github.com/renovatebot/renovate
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # Skip the ~8-minute image build on PRs that only touch docs / CI-config —
      # none of the files matched below can change the built image. The job
      # itself still runs and reports the required "Build and push image" check
      # (green), so branch protection + Renovate auto-merge keep working; only
      # the heavy steps are skipped. Fail-open: any path NOT listed forces a
      # full build. Pushes to main, schedules and manual runs always build;
      # only the scheduled and manual runs go on to publish. NONIMAGE_RE must
      # stay in sync with the push paths-ignore list at the top of this file.
      - name: Detect image-relevant changes
        id: changes
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          NONIMAGE_RE: '(\.md$|^docs/|^\.docs/|^\.claude/|^disk_config/|^renovate\.json$|^\.github/renovate\.json5$|^\.github/workflows/(renovate-notify|vendor-drift-watch|monday-cockpit|build-disk)\.yml$|^LICENSE$|^Justfile$|^artifacthub-repo\.yml$|^\.gitignore$)'
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != 'pull_request' ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            echo "Event '${{ github.event_name }}' -> full build."
            exit 0
          fi
          files=$(gh api --paginate "repos/$REPO/pulls/$PR/files" --jq '.[].filename' | sed '/^$/d')
          if [ -z "$files" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            echo "No changed files reported -> building (fail-open)."
            exit 0
          fi
          echo "Changed files:"; printf '  %s\n' $files
          if printf '%s\n' "$files" | grep -qvE "$NONIMAGE_RE"; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            echo "-> image-relevant change detected; building."
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "-> only docs / CI-config changed; skipping the image build."
          fi

      - name: Lint shell scripts
        run: shellcheck build_files/build.sh

      # This is optional, but if you see that your builds are way too big for the runners, you can enable this by uncommenting the following lines:
      - name: Maximize build space
        if: steps.changes.outputs.build == 'true'
        uses: ublue-os/remove-unwanted-software@695eb75bc387dbcd9685a8e72d23439d8686cba6 # master as of 2025-10-10 (post-v9, untagged)

      - name: Get current date
        id: date
        run: |
          # This generates a timestamp like what is defined on the ArtifactHub documentation
          # E.G: 2022-02-08T15:38:15Z'
          # https://artifacthub.io/docs/topics/repositories/container-images/
          # https://linux.die.net/man/1/date
          echo "date=$(date -u +%Y\-%m\-%d\T%H\:%M\:%S\Z)" >> $GITHUB_OUTPUT

      # Image metadata for https://artifacthub.io/ - This is optional but is highly recommended so we all can get a index of all the custom images
      # The metadata by itself is not going to do anything, you choose if you want your image to be on ArtifactHub or not.
      - name: Image Metadata
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        id: metadata
        with:
          # This generates all the tags for your image, you can add custom tags here too!
          # Default tags are "$DEFAULT_TAG" and "$DEFAULT_TAG.$date".
          tags: |
            type=raw,value=${{ env.DEFAULT_TAG }}
            type=raw,value=${{ env.DEFAULT_TAG }}.{{date 'YYYYMMDD'}}
            type=raw,value={{date 'YYYYMMDD'}}
            type=sha,enable=${{ github.event_name == 'pull_request' }}
            type=ref,event=pr
          labels: |
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/${{ github.sha }}/README.md
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
            org.opencontainers.image.description=${{ env.IMAGE_DESC }}
            org.opencontainers.image.documentation=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/${{ github.sha }}/README.md
            org.opencontainers.image.source=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/blob/${{ github.sha }}/Containerfile
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.url=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/tree/${{ github.sha }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version=${{ env.DEFAULT_TAG }}.{{date 'YYYYMMDD'}}
            io.artifacthub.package.deprecated=false
            io.artifacthub.package.keywords=${{ env.IMAGE_KEYWORDS }}
            io.artifacthub.package.license=Apache-2.0
            io.artifacthub.package.logo-url=${{ env.IMAGE_LOGO_URL }}
            io.artifacthub.package.prerelease=false
            containers.bootc=1
          sep-tags: " "
          sep-annotations: " "

      - name: Build Image
        id: build_image
        if: steps.changes.outputs.build == 'true'
        uses: redhat-actions/buildah-build@061ffd31bb5c3f8733a6f9bbdf00a9fb02eb708c # main as of 2026-04-09 (Node 24)
        with:
          containerfiles: |
            ./Containerfile
          # Postfix image name with -custom to make it a little more descriptive
          # Syntax: https://docs.github.com/en/actions/learn-github-actions/expressions#format
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          oci: false

      # The akmods-nvidia-open base ships kernel modules PRE-BUILT for one
      # specific kernel, encoded in its tag (…:main-44-<kver>…). kinoite-main
      # rolls its kernel forward independently, and Renovate's pinDigests can
      # only bump the akmods *digest* — never the <kver> in the tag string. So
      # a base bump can silently pair a new kernel with old modules: the build
      # still succeeds but the host boots to a black screen because the NVIDIA
      # modules don't match the running kernel. Catch that desync here, on the
      # PR, instead of at a customer's boot.
      - name: Verify NVIDIA akmods kernel matches base kernel
        if: steps.changes.outputs.build == 'true'
        run: |
          set -euo pipefail
          # Kernel baked into the akmods-nvidia-open tag in Containerfile,
          # e.g. main-44-7.0.4-200.fc44.x86_64 -> 7.0.4-200.fc44.x86_64
          akmods_kver=$(grep -oP 'akmods-nvidia-open:main-[0-9]+-\K[^@[:space:]]+' Containerfile || true)
          if [ -z "$akmods_kver" ]; then
            echo "::error::Could not parse the akmods-nvidia-open kernel from Containerfile — has the FROM line format changed?"
            exit 1
          fi
          # Actual kernel the built image runs. We never replace the kernel,
          # so this is exactly what the pinned kinoite-main base ships. Query
          # rpm inside the image so the ubuntu runner needs no rpm of its own.
          ctr=$(buildah from "localhost/${IMAGE_NAME}:${DEFAULT_TAG}")
          image_kver=$(buildah run "$ctr" rpm -q --queryformat '%{VERSION}-%{RELEASE}.%{ARCH}\n' kernel-core | tail -1)
          buildah rm "$ctr" >/dev/null
          echo "akmods tag kernel : ${akmods_kver}"
          echo "base image kernel : ${image_kver}"
          if [ "$akmods_kver" != "$image_kver" ]; then
            echo "::error::kinoite-main now ships kernel ${image_kver} but the akmods-nvidia-open tag in Containerfile is pinned to ${akmods_kver}. The prebuilt NVIDIA modules won't match the running kernel (black screen on boot). Bump the akmods tag to main-44-${image_kver} and let Renovate re-pin its digest."
            exit 1
          fi
          echo "✓ NVIDIA akmods kernel matches base image kernel (${image_kver})"

      # SECURITY-TODO #8: extract just the RPM database from the built image
      # so syft can catalog it in seconds, instead of walking the full multi-GB
      # bootc rootfs (which exhausts free GHA runners). Coverage is
      # near-100% because build.sh installs every third-party payload via
      # dnf — no curl|tar of vendor binaries. The
      # tradeoff is documented in SECURITY.md and SECURITY-TODO #3.
      - name: Extract RPM database from built image
        if: steps.changes.outputs.build == 'true'
        run: |
          # buildah unshare enters a user namespace so rootless mount works.
          # On this image /usr/lib/sysimage/rpm is a symlink to ../../share/rpm,
          # so `cp -RL` dereferences it to copy the actual rpmdb.sqlite (~115MB)
          # into the path layout syft expects. Without -L the copy would be a
          # ~16-byte symlink and syft would find zero packages.
          buildah unshare bash -ec '
            ctr=$(buildah from "localhost/${IMAGE_NAME}:${DEFAULT_TAG}")
            root=$(buildah mount "$ctr")
            mkdir -p ./sbom-input/usr/lib/sysimage/rpm
            cp -RL "$root/usr/lib/sysimage/rpm/." ./sbom-input/usr/lib/sysimage/rpm/
            buildah umount "$ctr"
            buildah rm "$ctr"
          '
          du -sh ./sbom-input
          # Sanity check: a real Fedora RPM DB is tens of MB. < 10MB means the
          # extract silently degraded (symlink not dereferenced, wrong path, etc).
          size_kb=$(du -sk ./sbom-input | cut -f1)
          if [ "$size_kb" -lt 10000 ]; then
            echo "::error::sbom-input is only ${size_kb}KB — RPM DB extract failed."
            exit 1
          fi

      - name: Install Syft
        if: steps.changes.outputs.build == 'true'
        run: |
          curl -fsSL "https://github.com/anchore/syft/releases/download/${SYFT_VERSION}/syft_${SYFT_VERSION#v}_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin syft
          syft version

      # SECURITY-TODO #8: CycloneDX SBOM, generated from the extracted RPM
      # database directory. attest-sbom below binds this to the pushed digest.
      - name: Generate SBOM (CycloneDX)
        if: steps.changes.outputs.build == 'true'
        run: |
          syft scan dir:./sbom-input -o cyclonedx-json=sbom.cdx.json
          {
            echo "## SBOM"
            echo ""
            echo "Generated \`sbom.cdx.json\` ($(wc -c < sbom.cdx.json) bytes,"
            echo "$(jq -r '.components | length' sbom.cdx.json) components) from RPM database."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install Grype
        if: steps.changes.outputs.build == 'true'
        run: |
          curl -fsSL "https://github.com/anchore/grype/releases/download/${GRYPE_VERSION}/grype_${GRYPE_VERSION#v}_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin grype
          grype version

      # SECURITY-TODO #3: CVE scan via the SBOM (no image re-catalog).
      # Report-only — does not fail the build. Flip to `--fail-on critical`
      # once a triage process is in place.
      - name: Scan SBOM with Grype (report-only)
        if: steps.changes.outputs.build == 'true'
        continue-on-error: true
        run: |
          grype "sbom:./sbom.cdx.json" --output table > grype-report.txt
          {
            echo "## Grype vulnerability scan — \`${IMAGE_NAME}:${DEFAULT_TAG}\`"
            echo ""
            echo '```'
            cat grype-report.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # Rechunk is a script that we use on Universal Blue to make sure there isnt a single huge layer when your image gets published.
      # This does not make your image faster to download, just provides better resumability and fixes a few errors.
      # Documentation for Rechunk is provided on their github repository at https://github.com/hhd-dev/rechunk
      # You can enable it by uncommenting the following lines:
      # - name: Run Rechunker
      #   id: rechunk
      #   uses: ublue-os/legacy-rechunk@a925083d9af7cb04b3e2a6e8c01bfa495f38b710 # v1.0.0
      #   with:
      #     rechunk: 'ghcr.io/ublue-os/legacy-rechunk:v1.0.0-x86_64'
      #     ref: "localhost/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}"
      #     prev-ref: "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}"
      #     skip_compression: true
      #     version: ${{ env.CENTOS_VERSION }}
      #     labels: ${{ steps.metadata.outputs.labels }} # Rechunk strips out all the labels during build, this needs to be reapplied here with newline separator

      # This is necessary so that the podman socket can find the rechunked image on its storage
      # - name: Load in podman and tag
      #   run: |
      #     IMAGE=$(podman pull ${{ steps.rechunk.outputs.ref }})
      #     sudo rm -rf ${{ steps.rechunk.outputs.output }}
      #     for tag in ${{ steps.metadata.outputs.tags }}; do
      #       podman tag $IMAGE ${{ env.IMAGE_NAME }}:$tag
      #     done

      # These `if` guards keep the publish path (login -> push -> sign ->
      # attest) to the Monday schedule and manual workflow_dispatch on main
      # only. Pull requests and ordinary pushes to main build-and-test but never
      # publish, so a merge never moves the registry on its own — the weekly run
      # (or an explicit "Run workflow") does. The ref check stops a dispatch on
      # a non-default branch from publishing.
      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Inline replacement for redhat-actions/push-to-registry (deprecated on
      # Node 20 and effectively unmaintained — no Node 24 update). buildah
      # picks up the registry credentials from docker/login-action above.
      # All tags point at the same content, so the manifest digest is
      # identical across them — capture it once via --digestfile.
      - name: Push To GHCR
        id: push
        if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          IMAGE_FULL="${IMAGE_REGISTRY}/${IMAGE_NAME}"
          digest=""
          for tag in ${{ steps.metadata.outputs.tags }}; do
            if [ -z "$digest" ]; then
              buildah push --digestfile=./push-digest.txt \
                "localhost/${IMAGE_NAME}:${tag}" \
                "docker://${IMAGE_FULL}:${tag}"
              digest=$(cat ./push-digest.txt)
            else
              buildah push \
                "localhost/${IMAGE_NAME}:${tag}" \
                "docker://${IMAGE_FULL}:${tag}"
            fi
          done
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "Pushed ${IMAGE_FULL} @ ${digest}"

      # This section is optional and only needs to be enabled if you plan on distributing
      # your project for others to consume. You will need to create a public and private key
      # using Cosign and save the private key as a repository secret in Github for this workflow
      # to consume. For more details, review the image signing section of the README.
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        with:
          cosign-release: 'v2.6.1'

      # Cosign signatures attach to the manifest *digest*, and every tag we
      # push points at the same manifest (see Push To GHCR), so one
      # digest-addressed signature covers all tags. Signing by digest also
      # avoids re-resolving each tag at sign time, which could race a
      # concurrent push moving a tag between our push and sign steps.
      - name: Sign container image
        if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          cosign sign -y --key env://COSIGN_PRIVATE_KEY "${IMAGE_REGISTRY}/${IMAGE_NAME}@${DIGEST}"
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          COSIGN_EXPERIMENTAL: false
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}

      # SECURITY-TODO #8: SLSA build provenance + CycloneDX SBOM attestations.
      # Both signed via Sigstore using the workflow's short-lived OIDC token
      # (no long-lived secret) and pushed as OCI referrers so a customer can
      # verify with `gh attestation verify` against the published artifact
      # alone — no GitHub API trust needed beyond the registry.
      - name: Attest build provenance
        if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Attest SBOM
        if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          sbom-path: sbom.cdx.json
          push-to-registry: true
