name: Vendored repo drift watch

# Watches the upstream URLs that our vendored .repo files came from. If any of
# them drift, opens (or updates) a GitHub issue with the diff so a human can
# decide whether to refresh the vendor. This is the inverse of `curl`-piping
# them at build time — it lets us pin baseurl + gpgkey in source while still
# noticing when upstream moves.

on:
  schedule:
    # Monday 13:00 UTC = 08:00 EST (winter) / 09:00 EDT (summer). Same day
    # as Renovate so the maintainer sees all drift signals together.
    - cron: '0 13 * * MON'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  drift-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: tailscale
            vendored: build_files/tailscale.repo
            upstream: https://pkgs.tailscale.com/stable/fedora/tailscale.repo
          - name: mullvad
            vendored: build_files/mullvad.repo
            upstream: https://repository.mullvad.net/rpm/stable/mullvad.repo
          - name: nvidia-container-toolkit
            vendored: build_files/nvidia-container-toolkit.repo
            upstream: https://nvidia.github.io/libnvidia-container/stable/rpm/nvidia-container-toolkit.repo
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Fetch upstream
        run: curl -fsSL "${{ matrix.upstream }}" -o /tmp/upstream.repo

      - name: Compare against vendored copy
        id: diff
        run: |
          if diff -u "${{ matrix.vendored }}" /tmp/upstream.repo > /tmp/drift.patch; then
            echo "drifted=false" >> "$GITHUB_OUTPUT"
          else
            echo "drifted=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update drift issue
        if: steps.diff.outputs.drifted == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          MATRIX_NAME: ${{ matrix.name }}
          MATRIX_VENDORED: ${{ matrix.vendored }}
          MATRIX_UPSTREAM: ${{ matrix.upstream }}
        run: |
          title="${MATRIX_NAME}.repo drifted from upstream"

          {
            echo "Upstream \`${MATRIX_NAME}.repo\` has drifted from the vendored copy at \`${MATRIX_VENDORED}\`."
            echo
            echo "Upstream URL: ${MATRIX_UPSTREAM}"
            echo
            echo '```diff'
            cat /tmp/drift.patch
            echo '```'
            echo
            echo "To refresh the vendor:"
            echo
            echo '```bash'
            echo "curl -fsSL ${MATRIX_UPSTREAM} -o ${MATRIX_VENDORED}"
            echo '```'
            echo
            echo "…then review the diff and open a PR. The new contents take effect on the next build."
          } > /tmp/issue-body.md

          existing=$(gh issue list --search "in:title \"${title}\"" --state open --json number --jq '.[0].number // ""')

          if [ -n "${existing}" ]; then
            gh issue edit "${existing}" --body-file /tmp/issue-body.md
            echo "Updated existing issue #${existing}"
          else
            gh issue create --title "${title}" --body-file /tmp/issue-body.md
          fi
